apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: registry.gitlab.com/piyush169/chaos-resilience/chaos-engine:latest 
        imagePullPolicy: Always
        command: ["./chaos-worker"] 
        env:
        - name: REDIS_URL
          value: "redis-service:6379"
        securityContext:
          capabilities:
            add: ["NET_ADMIN"] 
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
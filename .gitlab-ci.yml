stages:
  - build
  - plan
  - deploy
  - k8s_deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest
  AWS_ROLE_ARN: "arn:aws:iam::510674263883:role/GitLabPipelineRole"
  AWS_REGION: "ap-south-1"

build_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE

.aws_auth: &aws_auth
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - mkdir -p ~/.aws
    - |
      echo "[default]
      role_arn = ${AWS_ROLE_ARN}
      web_identity_token_file = /tmp/web_identity_token" > ~/.aws/config
    - echo "${GITLAB_OIDC_TOKEN}" > /tmp/web_identity_token
    - export AWS_CONFIG_FILE=~/.aws/config

  
plan_infra:
  <<: *aws_auth
  stage: plan
  image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest
  variables:
    TF_STATE_NAME: "chaos-prod"
  script:
    - cd infra
    - gitlab-terraform init
    - gitlab-terraform plan
  artifacts:
    paths:
      - infra/plan.cache

apply_infra:
  <<: *aws_auth
  stage: deploy
  image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest
  variables:
    TF_STATE_NAME: "chaos-prod"
  script:
    - cd infra
    - gitlab-terraform init
    - gitlab-terraform apply
  dependencies:
    - plan_infra
  
deploy_pods:
  stage: k8s_deploy
  image: 
    name: bitnami/kubectl:latest
    entrypoint: [""]
  script:
    # 1. Get the IP from Terraform output
    # 2. Use SSH to run the deployment on the EC2
    - chmod 400 $SSH_PRIVATE_KEY
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP "minikube kubectl -- apply -f /home/ubuntu/k8s/"
  dependencies:
    - apply_infra
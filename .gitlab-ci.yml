stages:
  - sync
  - build
  - plan
  - deploy
  - k8s_deploy
  - observe

variables:
  AWS_ROLE_ARN: arn:aws:iam::510674263883:role/GitLabPipelineRole
  AWS_REGION: us-east-1
  

default:
  tags:
    - docker-runner

sync-to-github:
  stage: sync
  image: 
    name: alpine/git:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone
  script:
    - git remote add github https://piyush169:${GITHUB_PAT}@github.com/piyush169/chaos-resilience.git || true
    - git push github HEAD:main --force
    - git push github --tags
  only:
    - main
  allow_failure: true

build_images:
  stage: build
  image: docker:latest
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/worker:latest .
    - docker push $CI_REGISTRY_IMAGE/worker:latest

plan_infra:
  stage: plan
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - cd infra
    - terraform init -reconfigure
    - terraform plan -out=plan.cache
  artifacts:
    paths:
      - infra/plan.cache
      - infra/.terraform
      - infra/.terraform.lock.hcl

apply_infra:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  needs: 
    - job: [plan_infra]
      artifacts: true
  script:
    - cd infra
    - apk add --no-cache aws-cli
   - |
      CREDENTIALS=$(aws sts assume-role \
        --role-arn "arn:aws:iam::510674263883:role/GitLabPipelineRole" \
        --role-session-name "GitLabLocalRunner" \
        --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]" \
        --output text)
    - export AWS_ACCESS_KEY_ID=$(echo $CREDENTIALS | cut -d' ' -f1)
    - export AWS_SECRET_ACCESS_KEY=$(echo $CREDENTIALS | cut -d' ' -f2)
    - export AWS_SESSION_TOKEN=$(echo $CREDENTIALS | cut -d' ' -f3)
    - terraform init -reconfigure
    - terraform apply -auto-approve plan.cache
    - echo "EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)" > ../deploy.env
  artifacts:
    reports:
      dotenv: deploy.env

.infra_job:
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client terraform aws-cli
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  

configure_networking:
  extends: .infra_job
  stage: deploy
  needs: [apply_infra]
  script:
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
        echo "Waiting for EC2 boot script (cloud-init) to finish..."
        until [ -f /var/lib/cloud/instance/boot-finished ]; do
          sleep 5
          echo -n "."
        done
        echo "Ready!"
        
        MINIKUBE_IP=$(minikube ip)
        sudo iptables -t nat -A PREROUTING -p tcp --dport 31379 -j DNAT --to-destination $MINIKUBE_IP:31379
        sudo iptables -I FORWARD 1 -d $MINIKUBE_IP -p tcp --dport 31379 -j ACCEPT
        
        sudo apt-get update && sudo apt-get install -y iptables-persistent

        sudo netfilter-persistent save
      EOF

deploy_pods:
  extends: .infra_job
  stage: k8s_deploy
  needs: [apply_infra, configure_networking]
  script:
    - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP "sudo chown -R ubuntu:ubuntu /home/ubuntu/k8s"
    - scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -r k8s/ ubuntu@$EC2_PUBLIC_IP:/home/ubuntu/
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
        minikube kubectl -- apply -f /home/ubuntu/k8s/
        minikube kubectl -- rollout restart deployment chaos-worker
      EOF

observe_cluster:
  stage: observe
  extends: .infra_job
  needs:
    - job: apply_infra
      artifacts: true
    - job: deploy_pods
  script:
    - |
      ssh -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
        helm upgrade --install redis-exporter prometheus-community/prometheus-redis-exporter \
          --set redisAddress=redis-service.default.svc.cluster.local:6379
        
        # Apply your ServiceMonitor and Dashboard ConfigMap so they don't vanish on restart
        minikube kubectl -- apply -f /home/ubuntu/k8s/service-monitor.yaml
        minikube kubectl -- apply -f /home/ubuntu/k8s/grafana-dashboard-cm.yaml
      EOF
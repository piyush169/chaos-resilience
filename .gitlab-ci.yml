stages:
  - sync
  - build
  - plan
  - deploy
  - k8s_deploy
  - observe

variables:
  AWS_ROLE_ARN: arn:aws:iam::510674263883:role/GitLabPipelineRole
  AWS_REGION: us-east-1

.aws_oidc_setup: &aws_oidc_setup |
  echo "$GITLAB_OIDC_TOKEN" > /tmp/gitlab_oidc_token
  export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/gitlab_oidc_token
  export AWS_ROLE_ARN="$AWS_ROLE_ARN"
  export AWS_REGION="$AWS_REGION"

.ssh_job:
  image: debian:bookworm-slim
  before_script:
    - apt-get update -y
    - apt-get install -y --no-install-recommends openssh-client ca-certificates
    - mkdir -p ~/.ssh
    - test -n "$SSH_PRIVATE_KEY" || (echo "SSH_PRIVATE_KEY is empty" && exit 1)
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null
    - test -n "$EC2_PUBLIC_IP" || (echo "EC2_PUBLIC_IP is empty" && exit 1)

default:
  tags:
    - docker-runner

sync-to-github:
  stage: sync
  image: 
    name: alpine/git:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone
  script:
    - git remote add github https://piyush169:${GITHUB_PAT}@github.com/piyush169/chaos-resilience.git 
    - git push github HEAD:main --force
    - git push github --tags
  only:
    - main
  allow_failure: true

build_images:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script:
    - until docker info; do sleep 1; done
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/worker:latest .
    - docker push $CI_REGISTRY_IMAGE/worker:latest



plan_infra:
  stage: plan
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  script:
    - *aws_oidc_setup
    - cd infra
    - terraform init -reconfigure
    - terraform plan -var="public_key=$SSH_PUBLIC_KEY" -out=plan.cache
  artifacts:
    paths:
      - infra/plan.cache
      - infra/.terraform
      - infra/.terraform.lock.hcl

apply_infra:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  needs:
    - job: plan_infra
      artifacts: true
  script:
    - *aws_oidc_setup
    - cd infra
    - terraform init -reconfigure
    - terraform apply -auto-approve -var="public_key=$SSH_PUBLIC_KEY" plan.cache
    - echo "EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)" > "$CI_PROJECT_DIR/deploy.env"
  artifacts:
    reports:
      dotenv: deploy.env


  

configure_networking:
  extends: .ssh_job
  stage: deploy
  needs:
    - job: apply_infra
      artifacts: true
  script:
    - |
      echo "Waiting for SSH to be available..."
      for i in {1..30}; do
        if ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=5 ubuntu@$EC2_PUBLIC_IP "echo SSH ready" 2>/dev/null; then
          echo "SSH connection established!"
          break
        fi
        echo "Attempt $i/30: SSH not ready yet, waiting 10s..."
        sleep 10
      done
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
        echo "Waiting for EC2 boot script (cloud-init) to finish..."
        until [ -f /var/lib/cloud/instance/boot-finished ]; do
          sleep 5
          echo -n "."
        done
        echo "Ready!"
        
        MINIKUBE_IP=$(minikube ip)
        sudo iptables -t nat -A PREROUTING -p tcp --dport 31379 -j DNAT --to-destination $MINIKUBE_IP:31379
        sudo iptables -I FORWARD 1 -d $MINIKUBE_IP -p tcp --dport 31379 -j ACCEPT
        
        sudo apt-get update && sudo apt-get install -y iptables-persistent

        sudo netfilter-persistent save
      EOF

deploy_pods:
  extends: .ssh_job
  stage: k8s_deploy
  needs: [apply_infra, configure_networking]
  script:
    - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP "sudo chown -R ubuntu:ubuntu /home/ubuntu/k8s"
    - scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -r k8s/ ubuntu@$EC2_PUBLIC_IP:/home/ubuntu/
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
        minikube kubectl -- apply -f /home/ubuntu/k8s/
        minikube kubectl -- rollout restart deployment chaos-worker
      EOF

observe_cluster:
  extends: .ssh_job
  stage: observe
  needs:
    - job: apply_infra
      artifacts: true
    - job: deploy_pods
  script:
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
        # Install Helm 
        if ! command -v helm &> /dev/null; then
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        fi
        
        # Add Prometheus 
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts || true
        helm repo update
        
        # Install Prometheus Operator 
        helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
          --namespace monitoring --create-namespace
        
        # Install Redis exporter
        helm upgrade --install redis-exporter prometheus-community/prometheus-redis-exporter \
          --set redisAddress=redis-service.default.svc.cluster.local:6379
        
        # Apply monitoring configs 
        if [ -f /home/ubuntu/k8s/service-monitor.yaml ]; then
          minikube kubectl -- apply -f /home/ubuntu/k8s/service-monitor.yaml
        fi
        if [ -f /home/ubuntu/k8s/grafana-dashboard-cm.yaml ]; then
          minikube kubectl -- apply -f /home/ubuntu/k8s/grafana-dashboard-cm.yaml
        fi
      EOF
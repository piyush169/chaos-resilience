stages:
  - sync
  - build
  - plan
  - deploy
  - k8s_deploy
  - observe

variables:
  AWS_ROLE_ARN: arn:aws:iam::510674263883:role/GitLabPipelineRole
  AWS_REGION: us-east-1

.aws_oidc_setup: &aws_oidc_setup |
  echo "$GITLAB_OIDC_TOKEN" > /tmp/gitlab_oidc_token
  export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/gitlab_oidc_token
  export AWS_ROLE_ARN="$AWS_ROLE_ARN"
  export AWS_REGION="$AWS_REGION"
  

default:
  tags:
    - docker-runner

sync-to-github:
  stage: sync
  image: 
    name: alpine/git:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone
  script:
    - git remote add github https://piyush169:${GITHUB_PAT}@github.com/piyush169/chaos-resilience.git 
    - git push github HEAD:main --force
    - git push github --tags
  only:
    - main
  allow_failure: true

build_images:
  stage: build
  image: docker:latest
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/worker:latest .
    - docker push $CI_REGISTRY_IMAGE/worker:latest

oidc_debug:
  stage: plan
  tags: [docker-runner]
  image: alpine:3.19
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  script:
    - apk add --no-cache jq coreutils
    - |
      b64url_decode() {
        # base64url -> base64, then decode; add padding if needed
        input="$1"
        input="$(echo -n "$input" | tr '_-' '/+')"
        mod=$(( ${#input} % 4 ))
        if [ $mod -eq 2 ]; then input="${input}=="; fi
        if [ $mod -eq 3 ]; then input="${input}="; fi
        echo -n "$input" | base64 -d 2>/dev/null
      }

      header="$(echo "$GITLAB_OIDC_TOKEN" | cut -d '.' -f1)"
      payload="$(echo "$GITLAB_OIDC_TOKEN" | cut -d '.' -f2)"

      echo "=== JWT header ==="
      b64url_decode "$header" | jq .

      echo "=== JWT payload (only iss/sub/aud) ==="
      b64url_decode "$payload" | jq '{iss, sub, aud, exp, iat, nbf}'

plan_infra:
  stage: plan
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  script:
    - *aws_oidc_setup
    - cd infra
    - terraform init -reconfigure
    - terraform plan -out=plan.cache
  artifacts:
    paths:
      - infra/plan.cache
      - infra/.terraform
      - infra/.terraform.lock.hcl

apply_infra:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  needs: 
    - job: plan_infra
      artifacts: true
  script:
      - *aws_oidc_setup
      - cd infra
      - apk add --no-cache aws-cli
      - terraform init -reconfigure
      - terraform apply plan.cache
  artifacts:
    reports:
      dotenv: deploy.env

.infra_job:
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client terraform aws-cli
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  

configure_networking:
  stage: deploy
  needs: [apply_infra]
  image: alpine:3.19
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
        echo "Waiting for EC2 boot script (cloud-init) to finish..."
        until [ -f /var/lib/cloud/instance/boot-finished ]; do
          sleep 5
          echo -n "."
        done
        echo "Ready!"
        
        MINIKUBE_IP=$(minikube ip)
        sudo iptables -t nat -A PREROUTING -p tcp --dport 31379 -j DNAT --to-destination $MINIKUBE_IP:31379
        sudo iptables -I FORWARD 1 -d $MINIKUBE_IP -p tcp --dport 31379 -j ACCEPT
        
        sudo apt-get update && sudo apt-get install -y iptables-persistent

        sudo netfilter-persistent save
      EOF

deploy_pods:
  extends: .infra_job
  stage: k8s_deploy
  needs: [apply_infra, configure_networking]
  script:
    - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP "sudo chown -R ubuntu:ubuntu /home/ubuntu/k8s"
    - scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -r k8s/ ubuntu@$EC2_PUBLIC_IP:/home/ubuntu/
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
        minikube kubectl -- apply -f /home/ubuntu/k8s/
        minikube kubectl -- rollout restart deployment chaos-worker
      EOF

observe_cluster:
  stage: observe
  extends: .infra_job
  needs:
    - job: apply_infra
      artifacts: true
    - job: deploy_pods
  script:
    - |
      ssh -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
        helm upgrade --install redis-exporter prometheus-community/prometheus-redis-exporter \
          --set redisAddress=redis-service.default.svc.cluster.local:6379
        
        # Apply your ServiceMonitor and Dashboard ConfigMap so they don't vanish on restart
        minikube kubectl -- apply -f /home/ubuntu/k8s/service-monitor.yaml
        minikube kubectl -- apply -f /home/ubuntu/k8s/grafana-dashboard-cm.yaml
      EOF
stages:
  - build
  - plan
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest
  AWS_ROLE_ARN: "arn:aws:iam::510674263883:role/GitLabPipelineRole"
  AWS_REGION: "ap-south-1"

build_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE

plan_infra:
  stage: plan
  image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest
  variables:
    TF_STATE_NAME: "chaos-prod"
  script:
    - cd infra
    - gitlab-terraform init
    - gitlab-terraform plan
  artifacts:
    paths:
      - infra/plan.cache

apply_infra:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest
  variables:
    TF_STATE_NAME: "chaos-prod"
  script:
    - cd infra
    - gitlab-terraform init
    - gitlab-terraform apply
  dependencies:
    - plan_infra
  when: manual
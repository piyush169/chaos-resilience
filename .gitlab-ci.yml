stages:
  - build
  - plan
  - deploy
  - k8s_deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest
  AWS_ROLE_ARN: "arn:aws:iam::510674263883:role/GitLabPipelineRole"
  AWS_REGION: "ap-south-1"

build_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE

.aws_auth: &aws_auth
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - mkdir -p ~/.aws
    - |
      echo "[default]
      role_arn = ${AWS_ROLE_ARN}
      web_identity_token_file = /tmp/web_identity_token" > ~/.aws/config
    - echo "${GITLAB_OIDC_TOKEN}" > /tmp/web_identity_token
    - export AWS_CONFIG_FILE=~/.aws/config

  
plan_infra:
  <<: *aws_auth
  stage: plan
  image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest
  variables:
    TF_STATE_NAME: "chaos-prod"
  script:
    - cd infra
    - gitlab-terraform init
    - gitlab-terraform plan
  artifacts:
    paths:
      - infra/plan.cache

apply_infra:
  <<: *aws_auth
  stage: deploy
  image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest
  variables:
    TF_STATE_NAME: "chaos-prod"
  script:
    - cd infra
    - gitlab-terraform init
    - gitlab-terraform apply
    - export TF_HTTP_ADDRESS="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
    - export TF_HTTP_USERNAME="gitlab-ci-token"
    - export TF_HTTP_PASSWORD="${CI_JOB_TOKEN}"
    - echo "EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)" > ${CI_PROJECT_DIR}/deploy.env
    - cat ${CI_PROJECT_DIR}/deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
  dependencies:
    - plan_infra
  
deploy_pods:
  stage: k8s_deploy
  image: alpine:latest
  dependencies:
    - apply_infra
  script:
    - apk add --no-cache openssh-client curl
    - if [ -f deploy.env ]; then export $(grep -v '^#' deploy.env | xargs); fi
    - echo "Confirmed Target IP is $EC2_PUBLIC_IP"
    - if [ -z "$EC2_PUBLIC_IP" ]; then echo "FATAL EC2_PUBLIC_IP is still empty!"; exit 1; fi
    - curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/
    - echo `Target IP $EC2_PUBLIC_IP `
    - if [ -z "$SSH_PRIVATE_KEY" ]; then echo "SSH_PRIVATE_KEY is missing!"; exit 1; fi
    - cat "$SSH_PRIVATE_KEY" | tr -d '\r' > /tmp/id_rsa
    - echo "" >> /tmp/id_rsa
    - chmod 400 /tmp/id_rsa
    - scp -i /tmp/id_rsa -o StrictHostKeyChecking=no -r k8s/ ubuntu@$EC2_PUBLIC_IP:/home/ubuntu/
    - |
      echo "Waiting for Minikube to initialize..."
      for i in {1..30}; do
        if ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP "minikube status | grep -q 'Running'"; then
          echo "Minikube is up!"
          break
        fi
        echo "Still waiting... ($i/30)"
        sleep 10
      done
    - ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP "minikube kubectl -- apply -f /home/ubuntu/k8s/"
  